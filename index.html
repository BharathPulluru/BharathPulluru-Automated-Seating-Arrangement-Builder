<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamSeat ERP</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root{
--bg:#f5f7fb;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--primary1:#6366f1;
--primary2:#9333ea;
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Inter, system-ui;
}

body{
background:var(--bg);
color:var(--text);
}

header{
height:70px;
background:white;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:600;
}

.badgeLogo{
width:42px;
height:42px;
border-radius:14px;
background:linear-gradient(135deg,var(--primary1),var(--primary2));
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:600;
}

.menu{
font-size:24px;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 24px;
padding-bottom:120px;
}

.page{display:none;}
.page.active{display:block;}

.card{
background:var(--card);
border-radius:var(--radius);
padding:24px;
margin-bottom:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.04);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.stat-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px;
border-radius:var(--radius);
background:white;
box-shadow:0 8px 24px rgba(0,0,0,0.04);
}

button{
height:46px;
padding:0 20px;
border-radius:14px;
border:none;
font-weight:500;
cursor:pointer;
}

.primary{
background:linear-gradient(90deg,var(--primary1),var(--primary2));
color:white;
}

.secondary{
background:white;
border:1px solid var(--border);
}

input,select{
height:48px;
border-radius:14px;
border:1px solid var(--border);
padding:0 14px;
width:100%;
margin-top:6px;
}

label{
font-size:14px;
font-weight:500;
margin-top:14px;
display:block;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
}

.drawer{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:white;
padding:24px;
transition:.3s;
display:flex;
flex-direction:column;
gap:12px;
box-shadow:-10px 0 30px rgba(0,0,0,0.05);
}

.drawer.open{right:0;}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(90deg,var(--primary1),var(--primary2));
color:white;
padding:14px 22px;
border-radius:12px;
display:none;
}
.bottomNav{
position:fixed;
bottom:16px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:520px;
height:70px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
border-radius:24px;
display:flex;
align-items:center;
justify-content:space-around;
box-shadow:0 8px 30px rgba(0,0,0,0.12);
z-index:1000;
}

.navItem{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:11px;
color:#6b7280;
cursor:pointer;
transition:.25s;
}

.navItem span{
font-size:24px;
margin-bottom:2px;
transition:.25s;
}

.navItem.active{
color:#6366f1;
transform:translateY(-6px);
}

.navItem.active span{
transform:scale(1.25);
}

/* Floating Generate Button */

.fab{
position:absolute;
top:-26px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#6366f1,#9333ea);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
cursor:pointer;
transition:.25s;
}

.fab:hover{
transform:translateX(-50%) scale(1.05);
}

</style>
</head>

<body>

<header>
<div class="logo">
<div class="badgeLogo">B</div>
Automated Seating Arrangement Builder
</div>
<div class="menu" onclick="toggleMenu()">☰</div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

<div class="drawer" id="drawer">
<button onclick="go('dashboard')" id="btn_dashboard">Dashboard</button>
<button onclick="go('students')" id="btn_students">Students</button>
<button onclick="go('classrooms')" id="btn_classrooms">Classrooms</button>
<button onclick="go('staff')" id="btn_staff">Staff</button>
<button onclick="go('generate')" id="btn_generate">Generate Plan</button>
<button onclick="go('plans')" id="btn_plans">Seating Plans</button>
</div>

<div class="container">
<div id="dashboard" class="page active">
<h1>Dashboard</h1>
<p style="color:var(--muted);margin-top:6px;">Exam Seating Arrangement System</p>
<div id="statsBox"></div>
</div>

<div id="students" class="page"></div>
<div id="classrooms" class="page"></div>
<div id="staff" class="page"></div>
<div id="generate" class="page"></div>
<div id="plans" class="page"></div>
</div>

<div class="toast" id="toast"></div>
<div class="bottomNav">

<div class="navItem active" onclick="switchTab('dashboard',this)">
<span class="material-icons">home</span>
Home
</div>

<div class="navItem" onclick="switchTab('students',this)">
<span class="material-icons">groups</span>
Students
</div>

<div style="flex:0.6"></div>

<div class="fab" onclick="go('generate')">
<span class="material-icons">add</span>
</div>

<div class="navItem" onclick="switchTab('plans',this)">
<span class="material-icons">event_seat</span>
Plans
</div>

<div class="navItem" onclick="switchTab('staff',this)">
<span class="material-icons">school</span>
Staff
</div>

</div>



</div>

</div>

<script>

/* ===============================
   STORAGE SYSTEM
================================= */

function getData(key){
return JSON.parse(localStorage.getItem(key) || "[]");
}

function setData(key,data){
localStorage.setItem(key,JSON.stringify(data));
updateDashboard();
}

function initStorage(){
if(!localStorage.getItem("students")) setData("students",[]);
if(!localStorage.getItem("classrooms")) setData("classrooms",[]);
if(!localStorage.getItem("staff")) setData("staff",[]);
if(!localStorage.getItem("plans")) setData("plans",[]);
}

/* ===============================
   NAVIGATION
================================= */

function go(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");

toggleMenu(false);

if(page==="students") renderStudents();
if(page==="classrooms") renderClassrooms();
if(page==="staff") renderStaff();
if(page==="generate") renderGenerate();
if(page==="plans") renderPlans();
}
function switchTab(page,el){

document.querySelectorAll(".navItem").forEach(n=>{
n.classList.remove("active");
});

el.classList.add("active");

go(page);

}

function toggleMenu(force){

let drawer=document.getElementById("drawer");
let overlay=document.getElementById("overlay");

if(force===false){
drawer.classList.remove("open");
overlay.style.display="none";
return;
}

drawer.classList.toggle("open");
overlay.style.display=drawer.classList.contains("open")?"block":"none";
}

/* ===============================
   TOAST
================================= */

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* ===============================
   DASHBOARD
================================= */

function updateDashboard(){

let students=getData("students");
let classrooms=getData("classrooms");
let staff=getData("staff");
let plans=getData("plans");

let totalSeats=classrooms.reduce((sum,r)=>sum+(r.rows*r.cols),0);

document.getElementById("statsBox").innerHTML=
`

<div class="stats">

<div class="stat-card">
<div>
<div style="font-size:13px;color:var(--muted);">TOTAL STUDENTS</div>
<div style="font-size:28px;font-weight:600;">${students.length}</div>
</div>
<div style="width:48px;height:48px;border-radius:14px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
display:flex;align-items:center;justify-content:center;color:white;">👥</div>
</div>

<div class="stat-card">
<div>
<div style="font-size:13px;color:var(--muted);">CLASSROOMS</div>
<div style="font-size:28px;font-weight:600;">${classrooms.length}</div>
</div>
<div style="width:48px;height:48px;border-radius:14px;
background:linear-gradient(135deg,#10b981,#059669);
display:flex;align-items:center;justify-content:center;color:white;">🏫</div>
</div>

<div class="stat-card">
<div>
<div style="font-size:13px;color:var(--muted);">STAFF MEMBERS</div>
<div style="font-size:28px;font-weight:600;">${staff.length}</div>
</div>
<div style="width:48px;height:48px;border-radius:14px;
background:linear-gradient(135deg,#f59e0b,#d97706);
display:flex;align-items:center;justify-content:center;color:white;">👨‍🏫</div>
</div>

<div class="stat-card">
<div>
<div style="font-size:13px;color:var(--muted);">SEATING PLANS</div>
<div style="font-size:28px;font-weight:600;">${plans.length}</div>
</div>
<div style="width:48px;height:48px;border-radius:14px;
background:linear-gradient(135deg,#a855f7,#7e22ce);
display:flex;align-items:center;justify-content:center;color:white;">📋</div>
</div>

</div>


<!-- Generate New Arrangement -->


<div class="card" style="
background:linear-gradient(135deg,#eef2ff,#f3e8ff);
margin-top:30px;">

<h3>Generate New Arrangement</h3>
<p style="color:var(--muted);margin-bottom:16px;">
Create AI-powered seating plan
</p>

</div>

<button class="primary"
style="margin-top:20px;width:100%;"
onclick="go('generate')">
Start Generation →
</button>

</div>


<!-- Recent Plans -->

<div class="card" style="margin-top:30px;">
<h3>Recent Seating Plans</h3>

${plans.length===0?
`<p style="color:var(--muted);margin-top:10px;">No seating plans yet</p>`:
plans.slice(-3).reverse().map((p,i)=>`
<div 
onclick="go('plans'); setTimeout(()=>openPlan(${plans.length-1-i}),100)"
onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 10px 20px rgba(0,0,0,0.08)'"
onmouseout="this.style.transform='translateY(0px)';this.style.boxShadow='0 4px 10px rgba(0,0,0,0.04)'"
style="
margin-top:12px;
padding:14px;
border:1px solid var(--border);
border-radius:14px;
cursor:pointer;
transition:0.25s;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
"
>

<div style="display:flex;justify-content:space-between;align-items:center;">
<strong>${p.name}</strong>
<span style="color:#6366f1;font-weight:600;">→</span>
</div>
<span style="color:var(--muted);font-size:13px;">
${p.date} • ${p.session}
</span>

</div>
`).join("")
}

</div>


<!-- Quick Actions -->

<div class="card" style="margin-top:30px;">
<h3>Quick Actions</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">

<button class="secondary" onclick="go('students')">Add Students</button>
<button class="secondary" onclick="go('classrooms')">Add Classrooms</button>
<button class="secondary" onclick="go('staff')">Add Staff</button>
<button class="secondary" onclick="go('generate')">Generate Plan</button>

</div>
</div>


<!-- Capacity Overview -->

<div class="card" style="margin-top:30px;">
<h3>Capacity Overview</h3>

<div style="margin-top:12px;">
Total Seats: <strong>${totalSeats}</strong>
</div>

<div style="margin-top:6px;">
Students to Seat: <strong>${students.length}</strong>
</div>

<div style="margin-top:6px;color:${totalSeats>=students.length?'#10b981':'#ef4444'};">
${totalSeats>=students.length?'Sufficient':'Insufficient Capacity'}
</div>

</div>

`;
}

/* ===============================
   DEPARTMENTS
================================= */

const departments=["CSE","ECE","EEE","MECH","CIVIL","IT","AIDS"];

/* ===============================
   STUDENTS PAGE
================================= */

function renderStudents(){

document.getElementById("students").innerHTML=
`
<h1>Students</h1>

<div class="card">

<div style="display:flex;justify-content:space-between;margin-bottom:15px;">
<div style="display:flex;gap:10px;">
<button class="primary" onclick="openStudentForm()">Add Student</button>
<button class="secondary" onclick="document.getElementById('studentFile').click()">Bulk Upload</button>
<button class="secondary" onclick="deleteSelectedStudents()">Delete Selected</button>
</div>
</div>

<table style="width:100%;border-collapse:collapse;">
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAllStudents(this)"></th>
<th style="text-align:left;">Roll</th>
<th style="text-align:left;">Name</th>
<th style="text-align:left;">Department</th>
<th style="text-align:left;">Year</th>
<th style="text-align:left;">Action</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

</div>

<input type="file" id="studentFile" accept=".csv" style="display:none" onchange="uploadStudents(event)">
`;

let students=getData("students");
let table=document.getElementById("studentTable");

students.forEach((s,i)=>{
table.innerHTML+=`
<tr>
<td><input type="checkbox" class="studentCheck" value="${i}"></td>
<td>${s.roll}</td>
<td>${s.name}</td>
<td>${s.dept}</td>
<td>${s.year}</td>
<td>
<button class="secondary" onclick="deleteStudent(${i})">Delete</button>
</td>
</tr>
`;
});
}

/* ===============================
   ADD STUDENT
================================= */

function openStudentForm(){

let deptOptions=departments.map(d=>`<option>${d}</option>`).join("");

document.getElementById("students").innerHTML+=
`
<div class="card">
<h3>Add Student</h3>

<label>Roll Number</label>
<input id="newRoll">

<label>Name</label>
<input id="newName">

<label>Department</label>
<select id="newDept">${deptOptions}</select>

<label>Year</label>
<select id="newYear">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<button class="primary" onclick="saveStudent()">Save</button>
</div>
`;
}

function saveStudent(){

let roll=document.getElementById("newRoll").value;
let name=document.getElementById("newName").value;
let dept=document.getElementById("newDept").value;
let year=document.getElementById("newYear").value;

if(!roll){toast("Roll required");return;}

let students=getData("students");

if(students.some(s=>s.roll===roll)){
toast("Roll already exists");
return;
}

students.push({roll,name,dept,year});
setData("students",students);

toast("Student Added");
renderStudents();
}

function deleteStudent(index){
let students=getData("students");
students.splice(index,1);
setData("students",students);
renderStudents();
}
function toggleAllStudents(source){
let checkboxes=document.querySelectorAll(".studentCheck");
checkboxes.forEach(cb=>cb.checked=source.checked);
}

function deleteSelectedStudents(){

let students=getData("students");
let selected=document.querySelectorAll(".studentCheck:checked");

if(selected.length===0){
alert("No students selected");
return;
}

let indexes=[...selected].map(cb=>parseInt(cb.value));

students=students.filter((_,i)=>!indexes.includes(i));

setData("students",students);
renderStudents();
}



/* ===============================
   BULK UPLOAD STUDENTS
================================= */

function uploadStudents(event){

let file=event.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(e){
let lines=e.target.result.split("\n");
let students=getData("students");

lines.forEach(line=>{
let [roll,name,dept,year]=line.split(",");
if(roll){
students.push({
roll:roll.trim(),
name:name?.trim(),
dept:dept?.trim(),
year:year?.trim()
});
}
});

setData("students",students);
toast("Students Uploaded");
renderStudents();
};

reader.readAsText(file);
}
/* ===============================
   CLASSROOMS PAGE
================================= */

function renderClassrooms(){

document.getElementById("classrooms").innerHTML=
`
<h1>Classrooms</h1>

<div class="card">

<div style="display:flex;justify-content:space-between;margin-bottom:15px;">
<div style="display:flex;gap:10px;">
<button class="primary" onclick="openClassroomForm()">Add Classroom</button>
<button class="secondary" onclick="document.getElementById('classroomFile').click()">Bulk Upload</button>
</div>
</div>

<table style="width:100%;border-collapse:collapse;">
<thead>
<tr>
<th>Room ID</th>
<th>Name</th>
<th>Rows</th>
<th>Columns</th>
<th>Capacity</th>
<th>Action</th>
</tr>
</thead>
<tbody id="classroomTable"></tbody>
</table>

</div>

<input type="file" id="classroomFile" accept=".csv" style="display:none" onchange="uploadClassrooms(event)">
`;

let classrooms=getData("classrooms");
let table=document.getElementById("classroomTable");

classrooms.forEach((c,i)=>{
table.innerHTML+=`
<tr>
<td>${c.id}</td>
<td>${c.name}</td>
<td>${c.rows}</td>
<td>${c.cols}</td>
<td>${c.rows*c.cols}</td>
<td>
<button class="secondary" onclick="deleteClassroom(${i})">Delete</button>
</td>
</tr>
`;
});
}

/* ADD CLASSROOM */

function openClassroomForm(){

document.getElementById("classrooms").innerHTML+=
`
<div class="card">
<h3>Add Classroom</h3>

<label>Room ID</label>
<input id="newRoomId">

<label>Room Name</label>
<input id="newRoomName">

<label>Rows</label>
<input type="number" id="newRows">

<label>Columns</label>
<input type="number" id="newCols">

<button class="primary" onclick="saveClassroom()">Save</button>
</div>
`;
}

function saveClassroom(){

let id=document.getElementById("newRoomId").value;
let name=document.getElementById("newRoomName").value;
let rows=parseInt(document.getElementById("newRows").value);
let cols=parseInt(document.getElementById("newCols").value);

if(!id){toast("Room ID required");return;}

let classrooms=getData("classrooms");

if(classrooms.some(r=>r.id===id)){
toast("Room ID already exists");
return;
}

classrooms.push({id,name,rows,cols});
setData("classrooms",classrooms);

toast("Classroom Added");
renderClassrooms();
}

function deleteClassroom(index){
let classrooms=getData("classrooms");
classrooms.splice(index,1);
setData("classrooms",classrooms);
renderClassrooms();
}

/* BULK UPLOAD CLASSROOMS */

function uploadClassrooms(event){

let file=event.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(e){
let lines=e.target.result.split("\n");
let classrooms=getData("classrooms");

lines.forEach(line=>{
let [id,name,rows,cols]=line.split(",");
if(id){
classrooms.push({
id:id.trim(),
name:name?.trim(),
rows:parseInt(rows),
cols:parseInt(cols)
});
}
});

setData("classrooms",classrooms);
toast("Classrooms Uploaded");
renderClassrooms();
};

reader.readAsText(file);
}

/* ===============================
   STAFF PAGE
================================= */

function renderStaff(){

document.getElementById("staff").innerHTML=
`
<h1>Staff</h1>

<div class="card">

<div style="display:flex;justify-content:space-between;margin-bottom:15px;">
<div style="display:flex;gap:10px;">
<button class="primary" onclick="openStaffForm()">Add Staff</button>
<button class="secondary" onclick="document.getElementById('staffFile').click()">Bulk Upload</button>
</div>
</div>

<table style="width:100%;border-collapse:collapse;">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Action</th>
</tr>
</thead>
<tbody id="staffTable"></tbody>
</table>

</div>

<input type="file" id="staffFile" accept=".csv" style="display:none" onchange="uploadStaff(event)">
`;

let staff=getData("staff");
let table=document.getElementById("staffTable");

staff.forEach((s,i)=>{
table.innerHTML+=`
<tr>
<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.dept}</td>
<td>
<button class="secondary" onclick="deleteStaff(${i})">Delete</button>
</td>
</tr>
`;
});
}

/* ADD STAFF */

function openStaffForm(){

let deptOptions=departments.map(d=>`<option>${d}</option>`).join("");

document.getElementById("staff").innerHTML+=
`
<div class="card">
<h3>Add Staff</h3>

<label>Staff ID</label>
<input id="newStaffId">

<label>Name</label>
<input id="newStaffName">

<label>Department</label>
<select id="newStaffDept">${deptOptions}</select>

<button class="primary" onclick="saveStaff()">Save</button>
</div>
`;
}

function saveStaff(){

let dept=document.getElementById("newStaffDept").value;

toast("ID already exists");
return;
}

staff.push({id,name,dept});
setData("staff",staff);

toast("Staff Added");

}

function deleteStaff(index){

setData("staff",staff);

}

/* BULK UPLOAD STAFF */

function uploadStaff(event){

if(!file) return;

let reader=new FileReader();

reader.onload=function(e){
let lines=e.target.result.split("\n");
let staff=getData("staff");

lines.forEach(line=>{
let [id,name,dept]=line.split(",");
if(id){
staff.push({
id:id.trim(),
name:name?.trim(),
dept:dept?.trim()
});
}
});

setData("staff",staff);
toast("Staff Uploaded");

/* =====================================================
   GENERATE SEATING – PREMIUM MULTI STEP WIZARD
===================================================== */

let currentStep = 1;
let selectedStudents = [];
let selectedRooms = [];
let editingPlanIndex = null;
let planNameValue = "";
let planDateValue = "";
let planSessionValue = "";
/* ================= ENTRY ================= */

function renderGenerate(){
currentStep = 1;
selectedStudents = [];
selectedRooms = [];
renderStep();
}

function renderStep(){

document.getElementById("generate").innerHTML = `
<h1>Generate Seating Plan</h1>
<p style="color:var(--muted);margin-bottom:24px;">
AI-powered exam seating arrangement
</p>

${stepBar()}

<div id="stepContent"></div>
`;

if(currentStep===1) step1();
if(currentStep===2) step2();
if(currentStep===3) step3();
if(currentStep===4) step4();
}

/* ================= STEP BAR ================= */

function stepBar(){
return `
<div style="display:flex;align-items:center;gap:16px;margin-bottom:40px;">
${circle(1)}
<div style="flex:1;height:4px;background:#e5e7eb;"></div>
${circle(2)}
<div style="flex:1;height:4px;background:#e5e7eb;"></div>
${circle(3)}
<div style="flex:1;height:4px;background:#e5e7eb;"></div>
${circle(4)}
</div>
`;
}

function circle(num){
let active = num<=currentStep;
return `
<div style="
width:40px;height:40px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-weight:600;color:white;
background:${active?'linear-gradient(135deg,var(--primary1),var(--primary2))':'#d1d5db'};
">
${num}
</div>
`;
}

/* ================= STEP 1 ================= */

function step1(){
document.getElementById("stepContent").innerHTML = `
<div class="card">
<h3>Basic Information</h3>

<label>Plan Name</label>
<input id="planName" required>

<label>Exam Date</label>
<input type="date" id="planDate" required>

<label>Session</label>
<select id="planSession">
<option>Morning</option>
<option>Afternoon</option>
</select>

<div style="margin-top:24px;text-align:right;">
<button class="primary" onclick="validateStep1()">Continue →</button>
</div>
</div>
`;
}
function validateStep1(){

let name = document.getElementById("planName");
let date = document.getElementById("planDate");
let session = document.getElementById("planSession");

if(!name.value.trim()){
name.reportValidity();
return;
}

if(!date.value){
date.reportValidity();
return;
}

planNameValue = name.value;
planDateValue = date.value;
planSessionValue = session.value;

nextStep();

}

/* ================= STEP 2 – STUDENTS ================= */

function step2(){

let students = getData("students");

/* GET FILTER VALUES */
let selectedDept = document.getElementById("filterDept")?.value || "ALL";
let selectedYear = document.getElementById("filterYear")?.value || "ALL";

/* GET UNIQUE YEARS */
let years = [...new Set(students.map(s => s.year))];

/* FILTER STUDENTS */
let searchValue = document.getElementById("studentSearch")?.value?.toLowerCase() || "";

let filteredStudents = students.filter(s=>{

    let deptMatch = selectedDept==="ALL" || s.dept===selectedDept;
    let yearMatch = selectedYear==="ALL" || s.year===selectedYear;

    let searchMatch =
        s.roll.toLowerCase().includes(searchValue) ||
        s.name.toLowerCase().includes(searchValue);

    return deptMatch && yearMatch && searchMatch;
});

let html = `
<div class="card">
<h3>Select Students</h3>

<div style="margin:16px 0;">
<label>Search Student</label>
<input 
id="studentSearch"
placeholder="Search by roll or name..."
oninput="filterStudents()">
</div>

<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;">

<div style="flex:1;min-width:150px;">
<label>Department</label>
<select id="filterDept" onchange="step2()">
<option value="ALL">All</option>
${departments.map(d=>
`<option value="${d}" ${selectedDept===d?'selected':''}>${d}</option>`
).join("")}
</select>
</div>

<div style="flex:1;min-width:150px;">
<label>Year</label>
<select id="filterYear" onchange="step2()">
<option value="ALL">All</option>
${years.map(y=>
`<option value="${y}" ${selectedYear===y?'selected':''}>${y}</option>`
).join("")}
</select>
</div>

</div>

<div style="display:flex;justify-content:space-between;margin-bottom:16px;">
<button class="secondary" onclick="selectAllFiltered()">Select Filtered</button>
<button class="secondary" onclick="clearStudentSelection()">Clear Selection</button>
</div>

<div style="max-height:320px;overflow:auto;">
`;

filteredStudents.forEach((s)=>{
let originalIndex = students.indexOf(s);
let selected = selectedStudents.includes(originalIndex);

html+=`
<div id="studentCard${originalIndex}"
onclick="toggleStudent(${originalIndex})"
style="
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
border:1px solid ${selected?'#6366f1':'var(--border)'};
border-radius:18px;
margin-bottom:14px;
cursor:pointer;
background:${selected?'linear-gradient(135deg,#eef2ff,#e0e7ff)':'white'};
transition:0.2s;
">

<div>
<div style="font-weight:600;">${s.roll} - ${s.name}</div>
<div style="color:var(--muted);font-size:13px;margin-top:6px;">
${s.dept} • Year ${s.year}
</div>
</div>

<input type="checkbox"
id="studentCheck${originalIndex}"
${selected?'checked':''}
onclick="event.stopPropagation();toggleStudent(${originalIndex})">

</div>
`;
});

html+=`
</div>

<div id="selectedCount" style="margin-top:16px;font-weight:600;">
${selectedStudents.length} students selected
</div>

<div style="margin-top:28px;display:flex;justify-content:space-between;">
<button class="secondary" onclick="prevStep()">Back</button>
<button class="primary" onclick="validateStep2()">Continue →</button>
</div>

</div>
`;

document.getElementById("stepContent").innerHTML = html;
}
function selectAllFiltered(){

let students = getData("students");

let selectedDept = document.getElementById("filterDept").value;
let selectedYear = document.getElementById("filterYear").value;

students.forEach((s,i)=>{
    let deptMatch = selectedDept==="ALL" || s.dept===selectedDept;
    let yearMatch = selectedYear==="ALL" || s.year===selectedYear;

    if(deptMatch && yearMatch){
        if(!selectedStudents.includes(i)){
            selectedStudents.push(i);
        }
    }
});

step2();
}

function clearStudentSelection(){
selectedStudents = [];
step2();
}
function toggleStudent(index){

    let card = document.getElementById("studentCard"+index);
    let checkbox = document.getElementById("studentCheck"+index);

    if(selectedStudents.includes(index)){
        selectedStudents = selectedStudents.filter(i => i !== index);

        card.style.border = "1px solid var(--border)";
        card.style.background = "white";
        checkbox.checked = false;

    } else {
        selectedStudents.push(index);

        card.style.border = "1px solid #6366f1";
        card.style.background = "linear-gradient(135deg,#eef2ff,#e0e7ff)";
        checkbox.checked = true;
    }

    // ✅ Update ONLY bottom counter
    let counter = document.getElementById("selectedCount");
    if(counter){
        counter.innerText = selectedStudents.length + " students selected";
    }
    
}
function filterStudents(){

    let searchValue = document.getElementById("studentSearch").value.toLowerCase();
    let students = getData("students");

    students.forEach((s,i)=>{

        let card = document.getElementById("studentCard"+i);
        if(!card) return;

        let match =
            s.roll.toLowerCase().includes(searchValue) ||
            s.name.toLowerCase().includes(searchValue);

        card.style.display = match ? "flex" : "none";
    });

}
/* ================= STEP 3 – CLASSROOMS ================= */

function step3(){

let rooms=getData("classrooms");

let html=`
<div class="card">
<h3>Select Classrooms</h3>

<div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
<button class="secondary" onclick="selectAllRooms()">Select All</button>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;">
`;

rooms.forEach((r,i)=>{

let selected = selectedRooms.includes(i);

html+=`
<div onclick="toggleRoom(${i})"
style="
border:1px solid ${selected?'#6366f1':'var(--border)'};
border-radius:20px;
padding:20px;
cursor:pointer;
background:${selected?'linear-gradient(135deg,#eef2ff,#e0e7ff)':'white'};
transition:0.2s;
">

<div style="font-weight:600;margin-bottom:8px;">
${r.name}
</div>

<div style="color:var(--muted);font-size:13px;">
${r.rows} × ${r.cols} = ${r.rows*r.cols} seats
</div>

<input type="checkbox"
${selected?'checked':''}
onclick="event.stopPropagation();toggleRoom(${i})"
style="margin-top:12px;">
</div>
`;
});

html+=`
</div>
${capacityBox()}

<div style="margin-top:28px;display:flex;justify-content:space-between;">
<button class="secondary" onclick="prevStep()">Back</button>
<button class="primary" onclick="validateStep3()">Continue →</button>
</div>

</div>
`;

document.getElementById("stepContent").innerHTML=html;
}

function toggleRoom(i){
if(selectedRooms.includes(i)){
selectedRooms=selectedRooms.filter(x=>x!==i);
}else{
selectedRooms.push(i);
}
step3();
}

function selectAllRooms(){
let total=getData("classrooms").length;
if(selectedRooms.length===total){
selectedRooms=[];
}else{
selectedRooms=[...Array(total).keys()];
}
step3();
}

function capacityBox(){
let rooms=getData("classrooms");
let totalSeats=selectedRooms.reduce((sum,i)=>sum+(rooms[i].rows*rooms[i].cols),0);

if(totalSeats < selectedStudents.length){
return `
<div style="margin-top:20px;padding:16px;
background:#fee2e2;color:#b91c1c;border-radius:16px;">
⚠ Not enough seats. Need ${selectedStudents.length-totalSeats} more seats.
</div>
`;
}

return `
<div style="margin-top:20px;padding:16px;
background:#dcfce7;color:#166534;border-radius:16px;">
✔ Capacity sufficient (${totalSeats} seats)
</div>
`;
}
function isValidSeat(seatArray, rows, cols, index, student){

    let row = Math.floor(index / cols);
    let col = index % cols;

    let neighbors = [];

    // Left
    if(col > 0) neighbors.push(index - 1);

    // Right
    if(col < cols - 1) neighbors.push(index + 1);

    // Top
    if(row > 0) neighbors.push(index - cols);

    // Bottom
    if(row < rows - 1) neighbors.push(index + cols);

    for(let n of neighbors){
        if(seatArray[n] && seatArray[n].dept === student.dept){
            return false;
        }
    }

    return true;
}
function step4(){

let rooms = getData("classrooms");
let students = getData("students");
let staff = getData("staff");

let totalSeats = selectedRooms.reduce((sum,i)=>sum+(rooms[i].rows*rooms[i].cols),0);

if(totalSeats < selectedStudents.length){
    toast("Not enough seats");
    currentStep = 3;
    renderStep();
    return;
}

/* ===== SORT BY DEPARTMENT ===== */
let shuffled = [...selectedStudents].sort(() => Math.random() - 0.5);

/* ===== STAFF ROTATION ===== */
let staffRotation = [...staff];
let staffIndex = 0;

let html = `<div class="card"><h3>Final Seating Plan</h3>`;
let studentQueue = [...shuffled];

const deptColors = {
CSE:"#DBEAFE",
ECE:"#D1FAE5",
EEE:"#FEF3C7",
MECH:"#FCE7F3",
CIVIL:"#E9D5FF",
IT:"#CFFAFE",
AIDS:"#FDE68A"
};

selectedRooms.forEach((roomIndex, rIndex)=>{

let room = rooms[roomIndex];
let capacity = room.rows * room.cols;

/* ===== ASSIGN STAFF (Avoid Own Dept Majority) ===== */
let invigilator = staffRotation[staffIndex % staffRotation.length];
staffIndex++;

html += `
<div style="margin-top:40px;">
<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>${room.name}</h3>
<div style="background:#f3f4f6;padding:6px 12px;border-radius:12px;font-size:13px;">
Invigilator: ${invigilator ? invigilator.name : "Not Assigned"}
</div>
</div>

<div style="color:var(--muted);font-size:13px;margin-bottom:8px;">
${capacity} seats
</div>

<div style="background:#1f2937;color:white;padding:10px;
border-radius:12px;text-align:center;margin-bottom:14px;">
📋 Board / Invigilator
</div>

<div style="
display:grid;
grid-template-columns:repeat(${room.cols},1fr);
gap:12px;
">
`;

/* ===== SAFE SEAT PLACEMENT ===== */

let seatArray = new Array(capacity).fill(null);

for(let pos = 0; pos < capacity; pos++){

    if(studentQueue.length === 0) break;

    let placedStudent = false;

    for(let i = 0; i < studentQueue.length; i++){

        let student = students[studentQueue[i]];

        if(isValidSeat(seatArray, room.rows, room.cols, pos, student)){
            seatArray[pos] = student;
            studentQueue.splice(i,1);
            placedStudent = true;
            break;
        }
    }

    /* fallback seat */
    if(!placedStudent){
        let student = students[studentQueue[0]];
        seatArray[pos] = student;
        studentQueue.shift();
    }

}

/* ===== RENDER SEATS ===== */
seatArray.forEach(seat=>{

if(seat){

let bg = deptColors[seat.dept] || "#ffffff";

html += `
<div style="
background:${bg};
border:1px solid #e5e7eb;
padding:12px;
border-radius:14px;
text-align:center;
font-size:12px;
font-weight:500;
">
<strong>${seat.roll}</strong><br>
${seat.name}<br>
<small>${seat.dept}</small>
</div>
`;

}else{

html += `
<div style="
border:1px dashed #e5e7eb;
padding:12px;
border-radius:14px;
opacity:.4;
text-align:center;
font-size:12px;">
Empty
</div>
`;

}

});


/* ===== DEPARTMENT COUNT ===== */

let deptCount = {};

seatArray.forEach(seat=>{
if(seat){
deptCount[seat.dept] = (deptCount[seat.dept] || 0) + 1;
}
});

let deptHTML = `
<div style="
margin-top:16px;
padding:12px;
background:#f9fafb;
border-radius:12px;
font-size:13px;
">
<strong>Question Papers Required:</strong><br>
`;

Object.keys(deptCount).forEach(d=>{
deptHTML += `${d} : ${deptCount[d]}<br>`;
});

deptHTML += `</div>`;

html += `</div>${deptHTML}</div>`;

html += `</div></div>`;

});

html += `
<div style="margin-top:30px;display:flex;justify-content:space-between;">
<button class="secondary" onclick="prevStep()">Back</button>
<div style="display:flex;gap:10px;">
<button class="secondary" onclick="downloadCurrentPlan()">Download PDF</button>
<button class="primary" onclick="savePlan()">Finalize</button>
</div>
</div>
`;

document.getElementById("stepContent").innerHTML = html;
}

/* ================= SAVE PLAN ================= */

function savePlan(){

let rooms = getData("classrooms");
let students = getData("students");

if(selectedRooms.length === 0){
    toast("No classroom selected");
    return;
}

if(selectedStudents.length === 0){
    toast("No students selected");
    return;
}

/* sort students by department */
let shuffled = [...selectedStudents].sort((a,b)=>{
    return students[a].dept.localeCompare(students[b].dept);
});

let studentQueue = [...shuffled];
let layout = [];

selectedRooms.forEach(roomIndex=>{

    let room = rooms[roomIndex];
    let totalSeats = room.rows * room.cols;

    let seats = new Array(totalSeats).fill(null);

    for(let i=0;i<totalSeats;i++){

        if(studentQueue.length > 0){

            let studentIndex = studentQueue.shift();
            seats[i] = students[studentIndex];

        }else{

            seats[i] = null;

        }

    }

    layout.push({
        roomName: room.name,
        rows: room.rows,
        cols: room.cols,
        seats: seats
    });

});

/* save plan */

let plans = getData("plans");

let newPlan = {
    name: planNameValue || "Exam",
date: planDateValue || "",
session: planSessionValue || "",
    layout: layout
};

if(editingPlanIndex !== null){
    plans[editingPlanIndex] = newPlan;
    editingPlanIndex = null;
}else{
    plans.push(newPlan);
}

setData("plans",plans);
toast("Plan Saved Successfully");
go("plans");

}

/* ================= HISTORY PAGE ================= */

function renderPlans(){

let plans=getData("plans");

let html=`
<h1>Seating Plans</h1>
<div class="card">
`;

if(plans.length===0){

}else{

">

</div>

</div>

});

}

html+=`</div>`;

}
function openPlan(index){

let plans=getData("plans");
let plan=plans[index];

let html=`
<h1>${plan.name}</h1>
<p style="color:var(--muted);margin-bottom:20px;">
${plan.date} • ${plan.session}
</p>
`;

plan.layout.forEach(room=>{

grid-template-columns:repeat(${room.cols},1fr);
gap:10px;margin-top:12px;">
`;

let deptCount = {};

room.seats.forEach(seat=>{

if(seat){

deptCount[seat.dept] = (deptCount[seat.dept] || 0) + 1;

html+=`
<div style="border:1px solid var(--border);
padding:10px;border-radius:12px;text-align:center;font-size:12px;">
<strong>${seat.roll}</strong><br>
${seat.name}<br>
<small>${seat.dept}</small>
</div>
`;

}else{

html+=`
<div style="opacity:.4;border:1px solid var(--border);
padding:10px;border-radius:12px;">Empty</div>
`;

}

});

html+=`</div>`;

html+=`
<div style="
margin-top:14px;
padding:12px;
background:#f9fafb;
border-radius:12px;
font-size:13px;
">
<strong>Question Papers Required:</strong><br>
`;

Object.keys(deptCount).forEach(d=>{
html+=`${d} : ${deptCount[d]}<br>`;
});

html+=`</div></div>`;
});

html+=`
<button class="secondary" onclick="go('plans')">
← Back to Plans
</button>
`;

document.getElementById("plans").innerHTML=html;
}
function editPlan(index){

let plans = getData("plans");
let plan = plans[index];

editingPlanIndex = index;

/* Load selections */
selectedStudents = [];
selectedRooms = [];

/* Restore students */
let allStudents = getData("students");

plan.layout.forEach(room=>{
    room.seats.forEach(seat=>{
        if(seat){
            let foundIndex = allStudents.findIndex(s=>s.roll===seat.roll);
            if(foundIndex !== -1 && !selectedStudents.includes(foundIndex)){
                selectedStudents.push(foundIndex);
            }
        }
    });
});

/* Restore rooms */
let allRooms = getData("classrooms");
plan.layout.forEach(room=>{
    let roomIndex = allRooms.findIndex(r=>r.name===room.roomName);
    if(roomIndex !== -1){
        selectedRooms.push(roomIndex);
    }
});

/* Go to generator */
go("generate");

setTimeout(()=>{
document.getElementById("planName").value = plan.name;
document.getElementById("planDate").value = plan.date;
document.getElementById("planSession").value = plan.session;
planNameValue = plan.name;
planDateValue = plan.date;
planSessionValue = plan.session;
},100);
}

/* ================= NAVIGATION ================= */
function validateStep2(){

if(selectedStudents.length === 0){

let msg = document.getElementById("studentError");

if(!msg){
document.getElementById("selectedCount").insertAdjacentHTML(
"afterend",
`<div id="studentError" style="color:#ef4444;margin-top:8px;font-size:14px;">
Please select at least one student
</div>`
);
}

return;
}

nextStep();

}

function validateStep3(){

if(selectedRooms.length === 0){

let box = document.querySelector("#stepContent .card");

if(!document.getElementById("roomError")){
box.insertAdjacentHTML(
"beforeend",
`<div id="roomError" style="color:#ef4444;margin-top:10px;">
Please select at least one classroom
</div>`
);
}

return;
}

nextStep();

}
function nextStep(){ currentStep++; renderStep(); }
function prevStep(){ currentStep--; renderStep(); }
function deletePlan(index){

let plans=getData("plans");

if(confirm("Are you sure you want to delete this plan?")){
plans.splice(index,1);
setData("plans",plans);
toast("Plan Deleted");
renderPlans();
}

}

function downloadCurrentPlan(){

let planName = document.getElementById("planName")?.value || "Exam Seating Plan";
let planDate = document.getElementById("planDate")?.value || "";
let planSession = document.getElementById("planSession")?.value || "";

let rooms = getData("classrooms");
let students = getData("students");

let shuffled = [...selectedStudents].sort((a,b)=>{
    return students[a].dept.localeCompare(students[b].dept);
});

let studentQueue = [...shuffled];
let layoutHTML = "";

selectedRooms.forEach(roomIndex=>{

    let room = rooms[roomIndex];
    let totalSeats = room.rows * room.cols;

    layoutHTML += `
    <div style="margin-top:40px;page-break-inside:avoid;">
    <h3 style="text-align:center;margin-bottom:10px;">${room.name}</h3>
    <div style="
        display:grid;
        grid-template-columns:repeat(${room.cols},1fr);
        gap:8px;
        font-size:12px;
    ">
    `;
let deptCount = {};
    for(let i=0;i<totalSeats;i++){

        if(studentQueue.length > 0){

            let studentIndex = studentQueue.shift();
            let s = students[studentIndex];
            deptCount[s.dept] = (deptCount[s.dept] || 0) + 1;

            layoutHTML += `
            <div style="border:1px solid #000;padding:6px;text-align:center;">
            <strong>${s.roll}</strong><br>
            ${s.name}
            </div>
            `;

        }else{

            layoutHTML += `
            <div style="border:1px solid #000;padding:6px;text-align:center;">
            Empty
            </div>
            `;

        }

    }

    layoutHTML += `</div>`;

layoutHTML += `
<div style="margin-top:10px;font-size:13px;">
<strong>Question Papers Required:</strong><br>
`;

Object.keys(deptCount).forEach(d=>{
layoutHTML += d + " : " + deptCount[d] + "<br>";
});

layoutHTML += `</div></div>`;

});

let win = window.open("", "", "width=1000,height=800");

win.document.write(`
<html>
<head>
<title>${planName}</title>
<style>
body{
    font-family:Arial;
    padding:30px;
}
h1{
    text-align:center;
}
.header{
    text-align:center;
    margin-bottom:30px;
}
</style>
</head>
<body>

<h1>Exam Seating Arrangement</h1>

<div class="header">
<strong>${planName}</strong><br>
${planDate} • ${planSession}
</div>

${layoutHTML}

</body>
</html>
`);

win.document.close();
win.focus();
win.print();
}
/* ================= INIT ================= */

initStorage();
updateDashboard();
